name: RustDesk Windows Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: Windows

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build Windows
      run: |
        cmd /c ./wv.build.bat
      shell: powershell