name: RustDesk Windows CI/CD

on:
  push:
    branches: [ main, master, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  VCPKG_DEFAULT_TRIPLET: x64-windows-static
  FLUTTER_VERSION: 3.24.5
  # Убираем VCPKG_ROOT из env, так как он будет установлен в шагах

jobs:
  build-windows:
    runs-on: Windows  # Исправлено: Windows -> windows-2022
    steps:
    # 1. Checkout исходников
    - name: Checkout RustDesk
      uses: actions/checkout@v4
      with:
        repository: rustdesk/rustdesk
        path: rustdesk
        submodules: recursive

    - name: Checkout custom patches (опционально)
      uses: actions/checkout@v4
      with:
        path: custom-patches

    # 2. Setup Rust
    - name: Setup Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        target: x86_64-pc-windows-msvc
        default: true
        override: true

    # 3. Setup Python
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # 4. Setup Flutter
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: stable
        cache: true

    - name: Enable Windows Desktop
      run: |
        flutter config --enable-windows-desktop
        flutter doctor -v
        flutter precache --windows

    # 5. Install vcpkg - ИСПРАВЛЕНО
    - name: Prepare vcpkg manually
      run: |
        # Добавляем vcpkg в PATH для текущей сессии
        $vcpkgPath = "C:\vcpkg"
        echo "VCPKG_ROOT=$vcpkgPath" | Out-File -FilePath $env:GITHUB_ENV -Append
        echo "$vcpkgPath" | Out-File -FilePath $env:GITHUB_PATH -Append

    # 6. Setup LLVM
    - name: Install LLVM
      run: |
        echo "LLVM_PATH=C:\Program Files\LLVM" | Out-File -FilePath $env:GITHUB_ENV -Append
        echo "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

    # 7. Download Flutter Engine (RustDesk custom)
    - name: Download RustDesk Flutter Engine
      run: |
        $engineUrl = "https://github.com/rustdesk/engine/releases/download/main/windows-x64-release.zip"
        Invoke-WebRequest -Uri $engineUrl -OutFile engine.zip
        $flutterCachePath = "$env:USERPROFILE\AppData\Local\flutter\bin\cache\artifacts\engine\windows-x64-release"
        New-Item -ItemType Directory -Force -Path $flutterCachePath
        Expand-Archive -Path engine.zip -DestinationPath $flutterCachePath -Force

    # 8. Install ImageMagick
    - name: Install ImageMagick
      run: choco install imagemagick -y

    # 10. Install cargo tools
    - name: Install cargo-flutter-bridge
      run: |
        cargo install flutter_rust_bridge_codegen --version 1.80.1 --features uuid

    # 13. Generate Flutter-Rust bridge
    - name: Generate bridge code
      working-directory: rustdesk
      run: |
        cd flutter
        flutter clean
        flutter pub get
        cd ..
        flutter_rust_bridge_codegen --rust-input src/flutter_ffi.rs --llvm-path "$env:LLVM_PATH" --dart-output flutter/lib/generated_bridge.dart

    # Или более простой способ - установить через chocolatey
    - name: Install Visual Studio Build Tools
      run: |
        choco install visualstudio2022-buildtools --yes
        choco install visualstudio2022-workload-vctools --yes --params "--add Microsoft.VisualStudio.Component.VC.Llvm.ClangToolset --add Microsoft.VisualStudio.Component.VC.Tools.x86.x64 --add Microsoft.VisualStudio.Component.VC.Redist.14.Latest --add Microsoft.VisualStudio.Component.Windows10SDK.20348"
        # Обновляем переменные окружения
        $vsPath = "C:\Program Files\Microsoft Visual Studio\2022\BuildTools\VC\Auxiliary\Build"
        if (Test-Path $vsPath) {
          echo "$vsPath" | Out-File -FilePath $env:GITHUB_PATH -Append
        }

    # 14. Build Rust backend
    - name: Build Rust backend
      working-directory: rustdesk
      run: |
        python build.py --flutter
      env:
        RENDEZVOUS_SERVER: ${{ secrets.RENDEZVOUS_SERVER }}
        RS_PUB_KEY: ${{ secrets.RS_PUB_KEY }}
        VCPKG_ROOT: C:\vcpkg

    # 15. Build Flutter Windows app
    - name: Build Flutter Windows
      working-directory: rustdesk/flutter
      run: flutter build windows --release

    # 16. Prepare output directory
    - name: Prepare artifacts
      working-directory: rustdesk
      run: |
        $outDir = "Release"
        if (Test-Path $outDir) { Remove-Item -Recurse -Force $outDir }
        New-Item -ItemType Directory -Force -Path $outDir

        # Copy Flutter build
        $flutterBuildPath = "flutter/build/windows/x64/runner/Release"
        if (Test-Path $flutterBuildPath) {
          Copy-Item "$flutterBuildPath/*" "$outDir/" -Recurse -Force
        }

        # Copy Rust binaries if exist
        if (Test-Path "target/release/rustdesk.exe") {
          Copy-Item "target/release/rustdesk.exe" "$outDir/" -Force
        }
        if (Test-Path "target/release/rustdesk_host.exe") {
          Copy-Item "target/release/rustdesk_host.exe" "$outDir/" -Force
        }

        # Copy vcpkg DLLs if needed
        $vcpkgBinPath = "${{ runner.workspace }}\vcpkg\installed\x64-windows-static\bin"
        if (Test-Path $vcpkgBinPath) {
          Copy-Item "$vcpkgBinPath/*.dll" "$outDir/" -Force
        }

        Write-Host "Build artifacts prepared in $outDir"
        Get-ChildItem $outDir

    # 17. Cache dependencies (перенесено перед загрузкой артефактов)
    - name: Cache cargo registry
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          rustdesk/target
        key: ${{ runner.os }}-cargo-${{ hashFiles('rustdesk/Cargo.lock') }}
        restore-keys: ${{ runner.os }}-cargo-

    - name: Cache vcpkg packages
      uses: actions/cache@v3
      with:
        path: ${{ runner.workspace }}/vcpkg/installed
        key: ${{ runner.os }}-vcpkg-${{ hashFiles('rustdesk/vcpkg.json') }}
        restore-keys: ${{ runner.os }}-vcpkg-

    # 18. Upload artifacts
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: rustdesk-windows-x64-${{ github.run_number }}
        path: rustdesk/Release/
        retention-days: 30

    # 19. Create GitHub Release (только при push в main)
    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: nightly-${{ github.run_number }}
        name: Nightly Build ${{ github.run_number }}
        draft: false
        prerelease: true
        files: rustdesk/Release/*.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}