name: RustDesk Windows CI/CD

on:
  push:
    branches: [ main, master, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  VCPKG_DEFAULT_TRIPLET: x64-windows-static
  FLUTTER_VERSION: 3.24.5
  # Убираем VCPKG_ROOT из env, так как он будет установлен в шагах

jobs:
  build-windows:
    runs-on: Windows  # Исправлено: Windows -> windows-2022
    steps:
    # 1. Checkout исходников
    - name: Checkout RustDesk
      uses: actions/checkout@v4
      with:
        repository: rustdesk/rustdesk
        path: rustdesk
        submodules: recursive

    - name: Checkout custom patches (опционально)
      uses: actions/checkout@v4
      with:
        path: custom-patches


    # 7. Download Flutter Engine (RustDesk custom)
    - name: Download RustDesk Flutter Engine
      run: |
        $engineUrl = "https://github.com/rustdesk/engine/releases/download/main/windows-x64-release.zip"
        $tempZip = "engine.zip"
        $tempExtract = "engine_temp"

        # Скачиваем архив
        Write-Host "Downloading from $engineUrl"
        Invoke-WebRequest -Uri $engineUrl -OutFile $tempZip

        # Создаем временную папку для распаковки
        New-Item -ItemType Directory -Force -Path $tempExtract

        # Распаковываем архив
        Write-Host "Extracting archive..."
        Expand-Archive -Path $tempZip -DestinationPath $tempExtract -Force

        # Находим папку windows-x64-release в распакованном содержимом
        $sourceFolder = Get-ChildItem -Path $tempExtract -Directory -Recurse | Where-Object { $_.Name -eq "windows-x64-release" } | Select-Object -First 1

        if ($sourceFolder) {
            # Целевая папка в github.workspace
            $destinationFolder = "${{ github.workspace }}\windows-x64-release"

            # Копируем папку
            Write-Host "Copying from $($sourceFolder.FullName) to $destinationFolder"
            Copy-Item -Path $sourceFolder.FullName -Destination $destinationFolder -Recurse -Force

            Write-Host "✅ Successfully copied windows-x64-release to $destinationFolder"

            # Дополнительно: показываем содержимое для проверки
            Get-ChildItem $destinationFolder
        } else {
            Write-Error "❌ Could not find 'windows-x64-release' folder in the downloaded archive"
            exit 1
        }

        # Очистка временных файлов
        Remove-Item $tempZip -Force -ErrorAction SilentlyContinue
        Remove-Item $tempExtract -Recurse -Force -ErrorAction SilentlyContinue

        Write-Host "✅ Cleanup completed"


      # 13. Generate Flutter-Rust bridge
    - name: Generate bridge code
      working-directory: rustdesk
      run: |
        cd flutter
        flutter clean
        flutter pub get
        cd ..
        flutter_rust_bridge_codegen --rust-input src/flutter_ffi.rs --dart-output flutter/lib/generated_bridge.dart

    # 14. Build Rust backend
    - name: Build Rust backend
      working-directory: rustdesk
      run: |
        python build.py --flutter
      env:
        RENDEZVOUS_SERVER: ${{ secrets.RENDEZVOUS_SERVER }}
        RS_PUB_KEY: ${{ secrets.RS_PUB_KEY }}
        VCPKG_ROOT: C:\vcpkg

    # 15. Build Flutter Windows app
    - name: Build Flutter Windows
      working-directory: rustdesk/flutter
      run: flutter build windows --release

    # 16. Prepare output directory
    - name: Prepare artifacts
      working-directory: rustdesk
      run: |
        $outDir = "Release"
        if (Test-Path $outDir) { Remove-Item -Recurse -Force $outDir }
        New-Item -ItemType Directory -Force -Path $outDir

        # Copy Flutter build
        $flutterBuildPath = "flutter/build/windows/x64/runner/Release"
        if (Test-Path $flutterBuildPath) {
          Copy-Item "$flutterBuildPath/*" "$outDir/" -Recurse -Force
        }

        # Copy Rust binaries if exist
        if (Test-Path "target/release/rustdesk.exe") {
          Copy-Item "target/release/rustdesk.exe" "$outDir/" -Force
        }
        if (Test-Path "target/release/rustdesk_host.exe") {
          Copy-Item "target/release/rustdesk_host.exe" "$outDir/" -Force
        }

        # Copy vcpkg DLLs if needed
        $vcpkgBinPath = "${{ runner.workspace }}\vcpkg\installed\x64-windows-static\bin"
        if (Test-Path $vcpkgBinPath) {
          Copy-Item "$vcpkgBinPath/*.dll" "$outDir/" -Force
        }

        Write-Host "Build artifacts prepared in $outDir"
        Get-ChildItem $outDir

    # 17. Cache dependencies (перенесено перед загрузкой артефактов)
    - name: Cache cargo registry
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          rustdesk/target
        key: ${{ runner.os }}-cargo-${{ hashFiles('rustdesk/Cargo.lock') }}
        restore-keys: ${{ runner.os }}-cargo-

    - name: Cache vcpkg packages
      uses: actions/cache@v3
      with:
        path: ${{ runner.workspace }}/vcpkg/installed
        key: ${{ runner.os }}-vcpkg-${{ hashFiles('rustdesk/vcpkg.json') }}
        restore-keys: ${{ runner.os }}-vcpkg-

    # 18. Upload artifacts
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: rustdesk-windows-x64-${{ github.run_number }}
        path: rustdesk/Release/
        retention-days: 30

    # 19. Create GitHub Release (только при push в main)
    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: nightly-${{ github.run_number }}
        name: Nightly Build ${{ github.run_number }}
        draft: false
        prerelease: true
        files: rustdesk/Release/*.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}