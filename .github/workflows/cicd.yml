name: RustDesk Windows Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: Windows

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build Windows
        run: ./wv.build.bat
        shell: powershell

      - name: Find and upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: "*.exe"
          if-no-files-found: error

  release:
    needs: build
    runs-on: Windows

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: ./artifact

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: "Release ${{ github.run_number }}"
          tag_name: "v${{ github.run_number }}"
          body: |
            Автоматический билд RustDesk для Windows
            
            Сборка #${{ github.run_number }}
            Коммит: ${{ github.sha }}
          draft: false
          prerelease: true
          files: ./artifact/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}